# Netlify – deploy do app (Vite SPA) com Netlify Functions

[build]
  base = "."
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  CI = "true"
  NPM_FLAGS = "--legacy-peer-deps"
  NPM_USE_NPM_CI = "false"

# ── Manifest PWA dinâmico (multi-tenant) ────────────────────────────────────
# /api/manifest → Netlify Function manifest.js
[[redirects]]
  from = "/api/manifest"
  to = "/.netlify/functions/manifest"
  status = 200

# ── SPA: todas as outras rotas caem no index.html ───────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

<body translate="no" class="notranslate">
  <div id="root" translate="no" class="notranslate"></div>
  <script>
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      console.log('PWA disponível e evento capturado no index.html');
    });
    if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => console.log('SW registrado com sucesso:', reg.scope)).catch((err) => console.error('Erro ao registrar SW:', err));
      });
    }
    setTimeout(function () {
      var root = document.getElementById('root');
      if (root && root.children.length === 0) {
        root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;background:#f8fafc;font-family:system-ui,sans-serif;color:#334155;"><p style="font-size:1.125rem;margin-bottom:16px;">O app demorou para carregar.</p><p style="color:#64748b;margin-bottom:24px;text-align:center;max-width:360px;">Abra o Console (F12) para ver possíveis erros de rede ou configuração.</p><button onclick="location.reload()" style="background:#2563eb;color:white;border:none;padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer;">Tentar novamente</button></div>';
      }
    }, 15000);
  </script>

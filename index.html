<!DOCTYPE html>
<html lang="pt-BR" translate="no" class="notranslate">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, viewport-fit=cover, user-scalable=yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gestão Igreja" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="msapplication-TileColor" content="#2563eb" />
  <meta name="msapplication-tap-highlight" content="no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" id="manifest-link" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
  <meta name="google" content="notranslate" />
  <title>Gestão Igreja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f8fafc;
      font-family: system-ui, sans-serif;
    }

    #root {
      min-height: 100vh;
    }

    #root:empty::after {
      content: "Carregando...";
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #64748b;
      font-size: 1.125rem;
    }
  </style>
</head>

<body translate="no" class="notranslate">
  <div id="root" translate="no" class="notranslate"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>


    // Ensure we capture the PWA prompt event globally 
    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent Chrome 67 and earlier from automatically showing the prompt
      e.preventDefault();
      // Stash the event so it can be triggered later.
      window.deferredPrompt = e;
      console.log('PWA disponível e evento capturado no index.html');
    });

    // Atualizar branding dinamicamente
    const link = document.getElementById("manifest-link");
    if (link) {
      const version = Date.now();
      const host = window.location.hostname;
      const mainDomain = 'church-gest-oficial.com.br';
      
      let subdomain = "";
      if (host.includes(mainDomain)) {
        subdomain = host.replace(mainDomain, "").replace(/\.$/, "").replace(/^\./, "").split(".")[0];
      } else {
        subdomain = host.split(".")[0];
      }

      const isLocal = host === 'localhost' || host === '127.0.0.1' || host.startsWith('192.168.');
      const isMainDomain = isLocal || !subdomain || subdomain === 'www' || subdomain === 'church-gest-oficial' || subdomain === 'localhost';
      
      // Aponta para a function da Netlify que gera o manifest dinamicamente
      link.setAttribute("href", `/api/manifest?v=${version}`);

      // Função para aplicar o branding na página
      const applyBranding = (name, logo) => {
        if (name) document.title = name;
        if (logo) {
          const favicon = document.querySelector('link[rel="icon"]');
          if (favicon) favicon.href = `${logo}?v=${version}`;
          
          // const logoImgs = document.querySelectorAll('img[src*="logo"], .church-logo');
          // logoImgs.forEach(img => { 
          //   if (img.tagName === 'IMG' && !img.src.includes('data:')) img.src = logo; 
          // });
        }
      };

      if (!isMainDomain) {
        // 1. Tentar pegar do manifest (Funciona na Vercel)
        fetch(`/api/manifest?v=${version}`)
          .then(r => r.json())
          .then(data => {
            if (data && data.name !== "Gestão Igreja") {
              applyBranding(data.name, data.icons?.[0]?.src);
            } else {
              throw new Error("Fallback needed");
            }
          })
          .catch(() => {
            // 2. Fallback Local: Buscar direto no Supabase
            const supabaseUrl = "https://amgpwwdhqtoaxkrvakzg.supabase.co";
            const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtZ3B3d2RocXRvYXhrcnZha3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTYzODMsImV4cCI6MjA4NTgzMjM4M30.36DWRC6AEL_KkGlV9Em8XHVVrO4R-eCEPbdN15MPzRo"; 
            
            fetch(`${supabaseUrl}/rest/v1/churches?slug=eq.${subdomain}`, {
              headers: { apikey: supabaseKey, Authorization: `Bearer ${supabaseKey}` }
            })
            .then(r => r.json())
            .then(data => {
              const igreja = data?.[0];
              if (igreja) applyBranding(igreja.name, igreja.logo_url);
            });
          });
      }
    }


    // Se o app não montar em 8s, mostra mensagem de ajuda (erro de import/rede/etc.)
    setTimeout(function () {
      var root = document.getElementById('root');
      if (root && root.children.length === 0) {
        root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;background:#f8fafc;font-family:system-ui,sans-serif;color:#334155;"><p style="font-size:1.125rem;margin-bottom:16px;">O app demorou para carregar.</p><p style="color:#64748b;margin-bottom:24px;text-align:center;max-width:360px;">Abra o Console (F12) para ver possíveis erros de rede ou configuração.</p><button onclick="location.reload()" style="background:#2563eb;color:white;border:none;padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer;">Tentar novamente</button></div>';
      }
    }, 15000);
  </script>
</body>

</html>
